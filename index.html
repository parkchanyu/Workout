<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <!-- 아이폰 앱처럼 보이게 하는 필수 메타 태그 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="내 운동앱">
  <link rel="apple-touch-icon" href="https://via.placeholder.com/192/3B82F6/FFFFFF?text=Workout">
  <title>운동 기록</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* 아이폰에서 터치할 때 생기는 파란색 하이라이트 제거 */
    body { -webkit-tap-highlight-color: transparent; }
    /* 상태바 영역(노치) 확보를 위한 패딩 */
    .app-container { padding-top: env(safe-area-inset-top); }
  </style>
</head>
<body class="bg-gray-100 selection:bg-blue-200">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [currentDate, setCurrentDate] = useState(new Date().toISOString().split('T')[0]);
      const [workouts, setWorkouts] = useState({});
      const [form, setForm] = useState({ name: '', weight: '', sets: '', reps: '' });

      // 앱 실행 시 아이폰 로컬 스토리지에서 데이터 불러오기
      useEffect(() => {
        const savedWorkouts = localStorage.getItem('myWorkouts');
        if (savedWorkouts) {
          setWorkouts(JSON.parse(savedWorkouts));
        }
      }, []);

      // 데이터가 변경될 때마다 아이폰 로컬 스토리지에 저장하기
      useEffect(() => {
        if (Object.keys(workouts).length > 0) {
          localStorage.setItem('myWorkouts', JSON.stringify(workouts));
        }
      }, [workouts]);

      const handleAdd = (e) => {
        e.preventDefault();
        if (!form.name.trim()) return;
        const newWorkout = { ...form, id: Date.now() };
        setWorkouts(prev => ({
          ...prev,
          [currentDate]: [...(prev[currentDate] || []), newWorkout]
        }));
        setForm({ name: '', weight: '', sets: '', reps: '' });
      };

      const handleDelete = (id) => {
        setWorkouts(prev => ({
          ...prev,
          [currentDate]: prev[currentDate].filter(w => w.id !== id)
        }));
      };

      const todaysWorkouts = workouts[currentDate] || [];

      return (
        <div className="app-container min-h-screen pb-10">
          <div className="max-w-md mx-auto bg-white min-h-screen shadow-lg">
            <header className="bg-blue-600 text-white p-6 rounded-b-3xl shadow-md">
              <h1 className="text-2xl font-bold text-center mb-4">💪 오늘의 운동</h1>
              <input
                type="date"
                value={currentDate}
                onChange={(e) => setCurrentDate(e.target.value)}
                className="w-full text-black p-3 rounded-xl border-none focus:ring-2 focus:ring-blue-300 text-lg font-semibold text-center"
              />
            </header>

            <main className="p-6">
              <form onSubmit={handleAdd} className="bg-gray-50 p-5 rounded-2xl shadow-sm border border-gray-100 mb-6 space-y-4">
                <input required type="text" placeholder="종목 (예: 벤치프레스)" className="w-full p-3 border rounded-xl"
                  value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
                <div className="flex gap-2">
                  <input type="number" placeholder="kg" className="w-1/3 p-3 border rounded-xl"
                    value={form.weight} onChange={e => setForm({...form, weight: e.target.value})} />
                  <input type="number" placeholder="세트" className="w-1/3 p-3 border rounded-xl"
                    value={form.sets} onChange={e => setForm({...form, sets: e.target.value})} />
                  <input type="number" placeholder="회" className="w-1/3 p-3 border rounded-xl"
                    value={form.reps} onChange={e => setForm({...form, reps: e.target.value})} />
                </div>
                <button type="submit" className="w-full bg-blue-600 text-white p-3 rounded-xl font-bold active:bg-blue-700 transition">추가하기</button>
              </form>

              <div className="space-y-3">
                {todaysWorkouts.length === 0 ? (
                  <p className="text-center text-gray-400 py-8">기록이 없습니다. 득근하세요! 🔥</p>
                ) : (
                  todaysWorkouts.map(w => (
                    <div key={w.id} className="flex justify-between items-center p-4 bg-white border border-gray-100 rounded-2xl shadow-sm">
                      <div>
                        <p className="font-bold text-gray-800 text-lg">{w.name}</p>
                        <p className="text-sm text-gray-500">
                          {w.weight && `${w.weight}kg`} {w.weight && w.sets && '·'} {w.sets && `${w.sets}세트`} {(w.weight || w.sets) && w.reps && '·'} {w.reps && `${w.reps}회`}
                        </p>
                      </div>
                      <button onClick={() => handleDelete(w.id)} className="text-red-400 p-2 text-xl active:text-red-600">×</button>
                    </div>
                  ))
                )}
              </div>
            </main>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
