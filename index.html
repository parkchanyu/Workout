<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="내 운동앱">
  <link rel="apple-touch-icon" href="https://via.placeholder.com/192/000000/FF0000?text=Workout">
  <title>운동 기록</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    body { 
      -webkit-tap-highlight-color: transparent; 
      background-color: #0a0a0a; /* 깊은 검은색 배경 */
    }
    /* 아이폰 노치 및 다이내믹 아일랜드 안전 영역 확보 */
    .safe-pt { padding-top: calc(env(safe-area-inset-top) + 1.5rem); }
    
    /* 다크모드에서 날짜 선택창 아이콘 색상 반전 (사파리 전용) */
    ::-webkit-calendar-picker-indicator { filter: invert(1); }
  </style>
</head>
<body class="text-gray-100 selection:bg-red-500/30">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [currentDate, setCurrentDate] = useState(new Date().toISOString().split('T')[0]);
      const [workouts, setWorkouts] = useState({});
      const [form, setForm] = useState({ name: '', weight: '', sets: '', reps: '' });

      useEffect(() => {
        const savedWorkouts = localStorage.getItem('myWorkouts');
        if (savedWorkouts) {
          setWorkouts(JSON.parse(savedWorkouts));
        }
      }, []);

      useEffect(() => {
        if (Object.keys(workouts).length > 0) {
          localStorage.setItem('myWorkouts', JSON.stringify(workouts));
        }
      }, [workouts]);

      const handleAdd = (e) => {
        e.preventDefault();
        if (!form.name.trim()) return;
        const newWorkout = { ...form, id: Date.now() };
        setWorkouts(prev => ({
          ...prev,
          [currentDate]: [...(prev[currentDate] || []), newWorkout]
        }));
        setForm({ name: '', weight: '', sets: '', reps: '' });
      };

      const handleDelete = (id) => {
        setWorkouts(prev => ({
          ...prev,
          [currentDate]: prev[currentDate].filter(w => w.id !== id)
        }));
      };

      const todaysWorkouts = workouts[currentDate] || [];

      return (
        <div className="min-h-screen pb-12">
          <div className="max-w-md mx-auto bg-[#121212] min-h-screen shadow-2xl">
            
            {/* 헤더 영역 */}
            <header className="bg-[#1a1a1a] safe-pt pb-6 px-6 rounded-b-3xl shadow-md border-b border-neutral-800">
              <h1 className="text-2xl font-extrabold text-center mb-5 text-gray-100 tracking-tight">
                <span className="text-red-600 mr-2">🩸</span>오늘의 운동
              </h1>
              <input
                type="date"
                value={currentDate}
                onChange={(e) => setCurrentDate(e.target.value)}
                className="w-full bg-[#2a2a2a] text-white p-3 rounded-xl border border-neutral-700 focus:outline-none focus:ring-2 focus:ring-red-600 text-lg font-semibold text-center tracking-wider"
              />
            </header>

            <main className="p-6">
              {/* 입력 폼 */}
              <form onSubmit={handleAdd} className="bg-[#1a1a1a] p-5 rounded-2xl shadow-sm border border-neutral-800 mb-8 space-y-4">
                <input 
                  required 
                  type="text" 
                  placeholder="종목 (예: 벤치프레스)" 
                  className="w-full bg-[#2a2a2a] text-white placeholder-gray-500 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-600 transition"
                  value={form.name} 
                  onChange={e => setForm({...form, name: e.target.value})} 
                />
                <div className="flex gap-3">
                  <input 
                    type="number" 
                    placeholder="kg" 
                    className="w-1/3 bg-[#2a2a2a] text-white placeholder-gray-500 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-600 transition"
                    value={form.weight} 
                    onChange={e => setForm({...form, weight: e.target.value})} 
                  />
                  <input 
                    type="number" 
                    placeholder="세트" 
                    className="w-1/3 bg-[#2a2a2a] text-white placeholder-gray-500 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-600 transition"
                    value={form.sets} 
                    onChange={e => setForm({...form, sets: e.target.value})} 
                  />
                  <input 
                    type="number" 
                    placeholder="회" 
                    className="w-1/3 bg-[#2a2a2a] text-white placeholder-gray-500 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-600 transition"
                    value={form.reps} 
                    onChange={e => setForm({...form, reps: e.target.value})} 
                  />
                </div>
                <button 
                  type="submit" 
                  className="w-full bg-red-600 hover:bg-red-700 text-white p-3 rounded-xl font-bold active:scale-95 transition-transform shadow-[0_0_15px_rgba(220,38,38,0.3)]"
                >
                  기록 추가하기
                </button>
              </form>

              {/* 기록 리스트 */}
              <div className="space-y-4">
                {todaysWorkouts.length === 0 ? (
                  <div className="text-center py-10 opacity-70">
                    <p className="text-neutral-500 text-lg mb-2">기록이 없습니다.</p>
                    <p className="text-red-500 font-semibold">득근하세요! 🔥</p>
                  </div>
                ) : (
                  todaysWorkouts.map(w => (
                    <div key={w.id} className="flex justify-between items-center p-4 bg-[#1a1a1a] border border-neutral-800 rounded-2xl shadow-sm hover:border-red-900 transition-colors">
                      <div>
                        <p className="font-bold text-gray-100 text-lg tracking-wide">{w.name}</p>
                        <p className="text-sm text-neutral-400 mt-1">
                          {w.weight && <span className="text-red-400 font-semibold">{w.weight}</span>}{w.weight && 'kg'} 
                          {w.weight && w.sets && <span className="mx-1 text-neutral-600">|</span>} 
                          {w.sets && <span className="text-gray-300">{w.sets}</span>}{w.sets && '세트'} 
                          {(w.weight || w.sets) && w.reps && <span className="mx-1 text-neutral-600">|</span>} 
                          {w.reps && <span className="text-gray-300">{w.reps}</span>}{w.reps && '회'}
                        </p>
                      </div>
                      <button 
                        onClick={() => handleDelete(w.id)} 
                        className="text-neutral-600 p-2 text-2xl active:text-red-600 transition-colors"
                      >
                        ×
                      </button>
                    </div>
                  ))
                )}
              </div>
            </main>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
